<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Tangent and Radius Perpendicular</title>
  <desc id="desc">At point T on the circle, the tangent line is perpendicular to radius OT.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1425" />
      <stop offset="100%" stop-color="#1a1f43" />
    </linearGradient>
    <style>
      .title { fill: #f8fbff; font: 700 38px 'Trebuchet MS', 'Avenir Next', sans-serif; }
      .circle-line { stroke: #8f86ff; stroke-width: 7; fill: none; }
      .radius { stroke: #72f1b8; stroke-width: 7; stroke-linecap: round; }
      .tangent { stroke: #ff6f59; stroke-width: 7; stroke-linecap: round; }
      .marker { stroke: #ffd166; stroke-width: 4; fill: none; }
      .point { fill: #ffd166; stroke: #1b263b; stroke-width: 2; }
      .label { fill: #ffffff; font: 700 22px 'Trebuchet MS', 'Avenir Next', sans-serif; }
      .note { fill: #c9ddff; font: 600 24px 'Trebuchet MS', 'Avenir Next', sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="26" fill="url(#bg3)" />

  <text x="54" y="62" class="title">Tangent is Perpendicular to Radius</text>

  <circle cx="420" cy="270" r="170" class="circle-line" />

  <line x1="420" y1="270" x2="590" y2="270" class="radius" />
  <line x1="590" y1="90" x2="590" y2="450" class="tangent" />

  <path d="M 590 270 L 574 270 L 574 254 L 590 254" class="marker" />

  <circle cx="420" cy="270" r="7" class="point" />
  <circle cx="590" cy="270" r="6" class="point" />
  <circle cx="590" cy="130" r="5" class="point" />

  <text x="408" y="302" class="label">O</text>
  <text x="598" y="278" class="label">T</text>
  <text x="598" y="124" class="label">P</text>

  <text x="488" y="258" class="note">OT = r</text>
  <text x="610" y="255" class="note">∠OTP = 90°</text>
</svg>
