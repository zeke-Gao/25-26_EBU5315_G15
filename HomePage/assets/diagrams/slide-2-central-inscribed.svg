<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Central and Inscribed Angles</title>
  <desc id="desc">In a circle with center O, central angle AOB is twice inscribed angle ACB on the same arc AB.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#11233f" />
    </linearGradient>
    <style>
      .title { fill: #f8fbff; font: 700 38px 'Trebuchet MS', 'Avenir Next', sans-serif; }
      .line-main { stroke: #ff6f59; stroke-width: 6; fill: none; stroke-linecap: round; }
      .line-sub { stroke: #72f1b8; stroke-width: 5; fill: none; stroke-linecap: round; }
      .angle-center { stroke: #ffd166; stroke-width: 5; fill: none; }
      .angle-inscribed { stroke: #9ec5ff; stroke-width: 4; fill: none; }
      .point { fill: #ffd166; stroke: #1b263b; stroke-width: 2; }
      .label { fill: #ffffff; font: 700 22px 'Trebuchet MS', 'Avenir Next', sans-serif; }
      .note { fill: #c9ddff; font: 600 24px 'Trebuchet MS', 'Avenir Next', sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="26" fill="url(#bg2)" />

  <text x="54" y="62" class="title">Central Angle = 2 x Inscribed Angle</text>

  <circle cx="450" cy="270" r="170" class="line-main" />

  <line x1="450" y1="270" x2="320" y2="161" class="line-main" />
  <line x1="450" y1="270" x2="580" y2="161" class="line-main" />
  <line x1="450" y1="440" x2="320" y2="161" class="line-sub" />
  <line x1="450" y1="440" x2="580" y2="161" class="line-sub" />

  <path d="M 406 233 A 58 58 0 0 1 494 233" class="angle-center" />
  <path d="M 431 399 A 45 45 0 0 1 469 399" class="angle-inscribed" />

  <circle cx="450" cy="270" r="7" class="point" />
  <circle cx="320" cy="161" r="5" class="point" />
  <circle cx="580" cy="161" r="5" class="point" />
  <circle cx="450" cy="440" r="5" class="point" />

  <text x="438" y="300" class="label">O</text>
  <text x="302" y="153" class="label">A</text>
  <text x="586" y="153" class="label">B</text>
  <text x="456" y="458" class="label">C</text>

  <text x="444" y="218" class="note">2x</text>
  <text x="451" y="386" class="note">x</text>
</svg>
