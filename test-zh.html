<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>圆几何学习测试</title>
  <link rel="stylesheet" href="test.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="logo" href="../HomePage/index-zh.html" aria-label="CircleSense 首页">
        <span class="logo-mark" aria-hidden="true"></span>
        <span class="logo-text">圆感知 CircleSense</span>
      </a>

      <nav class="breadcrumb" aria-label="面包屑导航">
        <a href="../HomePage/index-zh.html">主页</a>
        <span aria-hidden="true">›</span>
        <span class="breadcrumb-current">测验</span>
      </nav>

      <div class="tools" role="group" aria-label="无障碍工具">
        <button id="themeModeBtn" class="tool-btn" aria-label="主题模式">主题: 明亮</button>
        <button id="fontModeBtn" class="tool-btn" aria-label="字体模式">字体: 标准</button>
        <button id="cbModeBtn" class="tool-btn" aria-label="颜色模式">颜色: 标准</button>
        <button id="langToggleBtn" class="tool-btn" aria-label="切换语言">EN</button>
      </div>
    </header>

    <main class="main-layout" role="main">
      <section class="canvas-panel" aria-label="几何图示区域">
        <div class="canvas-frame">
          <canvas id="gameCanvas" width="900" height="560" aria-label="圆几何题图画布"></canvas>
        </div>
        <div class="assist-text" id="canvasHelp" aria-live="polite"></div>
      </section>

      <aside class="challenge-panel" aria-label="题目与答题区">
        <div class="quiz-progress-panel" aria-label="题号进度">
          <div class="quiz-progress-meta">
            <strong id="questionProgressLabel">第 1 / 10 题</strong>
            <span id="questionMixLabel">基础题 5 + 图形题 5</span>
          </div>
          <div id="questionNav" class="question-nav" role="list" aria-label="题号列表"></div>
        </div>

        <div class="task-box" id="taskText" aria-live="polite"></div>

        <div class="answer-box" id="fillAnswerBox" hidden>
          <label id="fillInputLabel" for="fillInput">填写答案</label>
          <input id="fillInput" type="number" inputmode="decimal" step="0.1" aria-label="输入数值答案" />
          <button id="submitFillBtn" class="btn-secondary" aria-label="提交填空答案">提交填空</button>
        </div>

        <div class="answer-box" id="choiceBox" hidden>
          <p class="answer-title" id="choiceTitle">选择正确答案</p>
          <div id="choiceButtons" class="choice-buttons"></div>
        </div>

        <div class="match-box" id="matchBox" hidden>
          <p class="match-title" id="matchTitle">定理配对</p>
          <div id="matchRows" class="match-rows"></div>
          <button id="submitMatchBtn" class="btn-secondary" aria-label="提交配对答案">提交配对</button>
        </div>
      </aside>
    </main>

    <section class="bottom-controls" aria-label="底部控制区">
      <div class="control-buttons">
        <button id="startBtn" class="btn-primary" aria-label="开始测试">开始测试</button>
        <button id="resetBtn" class="btn-ghost" aria-label="重置测试">重置</button>
      </div>

      <div class="difficulty-group" role="radiogroup" aria-label="难度">
        <label id="difficultyBasicLabel"><input type="radio" name="difficulty" value="basic" checked />基础</label>
        <label id="difficultyExpertLabel"><input type="radio" name="difficulty" value="expert" />专家</label>
      </div>

      <div class="status-grid" aria-label="分数与提示区" aria-live="polite">
        <div><span id="scoreLabel">分数</span>: <strong id="scoreValue">0</strong></div>
        <div><span id="correctLabel">已答对</span>: <strong id="correctValue">0</strong></div>
        <div><span id="goalLabel">目标题数</span>: <strong id="goalValue">0</strong></div>
        <div class="status-line" id="statusText"></div>
      </div>
    </section>

    <div id="levelClearOverlay" class="overlay" aria-hidden="true">
      <div class="overlay-card">
        <h2 id="overlayTitle">结果页</h2>
        <p id="overlayText">本轮测试完成。</p>
        <p><strong>Final score:</strong> <span id="resultFinalScore">0</span></p>
        <p><strong>Accuracy:</strong> <span id="resultAccuracy">0%</span></p>
        <p><strong>Suggested next step:</strong> <span id="resultSuggestion">--</span></p>
        <button id="resultCloseBtn" class="btn-primary" aria-label="完成">完成</button>
      </div>
    </div>

    <div id="answerFeedbackOverlay" class="overlay" aria-hidden="true">
      <div class="overlay-card">
        <h2 id="feedbackTitle">作答结果</h2>
        <p id="feedbackResult">回答正确。</p>
        <p id="feedbackAnswer">正确答案：--</p>
        <p id="feedbackAsk">是否查看解析？</p>
        <div class="feedback-actions" id="feedbackChoiceActions">
          <button id="feedbackSkipBtn" class="btn-ghost" aria-label="不查看解析">不查看，下一题</button>
          <button id="feedbackViewBtn" class="btn-secondary" aria-label="查看解析">查看解析</button>
        </div>
        <div id="feedbackExplanation" class="feedback-explanation" hidden>
          <h3 id="feedbackExplanationTitle">详细解答</h3>
          <p id="feedbackExplanationText">--</p>
        </div>
        <button id="feedbackContinueBtn" class="btn-primary" aria-label="继续下一题" hidden>继续下一题</button>
      </div>
    </div>
  </div>

  <script src="test.js"></script>
</body>
</html>
