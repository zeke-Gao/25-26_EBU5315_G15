<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Diameter and Radius Diagram</title>
  <desc id="desc">A circle with center O, diameter AB, and radius OB showing AB equals 2r.</desc>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1426" />
      <stop offset="100%" stop-color="#101d36" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ecbff" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { fill: #f8fbff; font: 700 40px 'Trebuchet MS', 'Avenir Next', sans-serif; }
      .label { fill: #c9ddff; font: 600 26px 'Trebuchet MS', 'Avenir Next', sans-serif; }
      .point { fill: #ffd166; stroke: #1b263b; stroke-width: 2; }
      .dot-label { fill: #ffffff; font: 700 24px 'Trebuchet MS', 'Avenir Next', sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="26" fill="url(#bg1)" />

  <text x="54" y="64" class="title">Diameter and Radius</text>

  <circle cx="450" cy="280" r="170" fill="none" stroke="#ff6f59" stroke-width="8" filter="url(#softGlow)" />

  <line x1="280" y1="280" x2="620" y2="280" stroke="#66d9ff" stroke-width="7" stroke-linecap="round" />
  <line x1="450" y1="280" x2="620" y2="280" stroke="#72f1b8" stroke-width="7" stroke-linecap="round" />

  <circle cx="450" cy="280" r="7" class="point" />
  <circle cx="280" cy="280" r="5" class="point" />
  <circle cx="620" cy="280" r="5" class="point" />

  <text x="440" y="312" class="dot-label">O</text>
  <text x="262" y="312" class="dot-label">A</text>
  <text x="624" y="312" class="dot-label">B</text>

  <text x="523" y="266" class="label">r</text>
  <text x="415" y="328" class="label">AB = 2r</text>
</svg>
